<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Erişim</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="password"] {
            width: 85%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            width: 90%;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        .hidden-content { display: none; }
        .info-box {
            background-color: #e9ecef;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #495057;
            margin-top: 10px;
            word-break: break-all;
        }
        .error { color: #dc3545; margin-top: 10px; font-size: 14px; font-weight: bold; }
        .copy-btn { background-color: #28a745; }
        .copy-btn:hover { background-color: #218838; }
        .label { font-size: 14px; color: #666; margin-top: 15px; display: block; text-align: left; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <div id="login-form">
        <h2>Güvenli Erişim</h2>
        <p style="color: #666; font-size: 14px;">Lütfen içeriği görüntülemek için şifreyi giriniz.</p>
        <input type="password" id="password" placeholder="Şifre">
        <br>
        <button onclick="verifyPassword()">Giriş Yap</button>
        <p id="error-msg" class="error"></p>
    </div>

    <div id="secure-content" class="hidden-content">
        <h2>Hesap Bilgileri</h2>
        
        <span class="label">Alıcı Adı:</span>
        <div class="info-box" id="recipient-text"></div>
        
        <span class="label">IBAN:</span>
        <div class="info-box" id="iban-text"></div>
        <button class="copy-btn" onclick="copyText('iban-text')">IBAN Kopyala</button>
    </div>
</div>

<script>
    // --- BİLGİLERİNİ SADECE AŞAĞIDAKİ ALANLARA YAZMAN YETERLİ ---
    
    const GERCEK_SIFRE     = "1234"; // BURAYI DEĞİŞTİR (Giriş şifreniz)
    const ALICI_ADI        = "Ahmet Yılmaz"; // BURAYI DEĞİŞTİR (İstediğin gibi Türkçe yazabilirsin)
    const GERCEK_IBAN      = "TR00 0000 0000 0000 0000 0000 00"; // BURAYI DEĞİŞTİR
    
    // ------------------------------------------------------------

    // Türkçe karakter hatasını önlemek için güvenli maskeleme fonksiyonu
    function safeEncode(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));
    }

    // Maskelenmiş veriyi hatasız çözme fonksiyonu
    function safeDecode(str) {
        return decodeURIComponent(atob(str).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    }

    const secureData = {
        name: safeEncode(ALICI_ADI),
        iban: safeEncode(GERCEK_IBAN)
    };

    function verifyPassword() {
        const input = document.getElementById('password').value;
        
        if (input === GERCEK_SIFRE) {
            document.getElementById('recipient-text').innerText = safeDecode(secureData.name);
            document.getElementById('iban-text').innerText = safeDecode(secureData.iban);

            document.getElementById('login-form').style.display = 'none';
            document.getElementById('secure-content').style.display = 'block';
        } else {
            document.getElementById('error-msg').innerText = "Hatalı şifre girdiniz!";
        }
    }

    function copyText(elementId) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Kopyalandı!");
        });
    }
</script>

</body>
</html>
